name: nix

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check flake inputs
        uses: DeterminateSystems/flake-checker-action@main

      - name: Run flake checks
        run: nix flake check --print-build-logs

  test-and-build:
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build flake outputs directly
        run: nix build .#vigil .#windows --print-build-logs

      - name: Run Linux tests inside Nix shell
        run: nix develop --command cargo test --target x86_64-unknown-linux-gnu
