name: nix

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Nix-based checks
        run: nix develop --command ci-checks

  test-and-build:
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests and release build inside Nix shell
        run: nix develop --command ci-test-build
