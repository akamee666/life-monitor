[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "x86_64-pc-windows-gnu",
]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
# The following advisories only affect the opt-in `multi-sync` feature via
# libsql 0.9.30 -> hyper-rustls 0.25.0, which pins an older rustls stack.
# No upstream patch release is available for this stack, and libsql 0.9.30 is
# the latest published version. Revisit when libsql bumps its rustls deps.
ignore = [
  # paste 1.0.15 is pulled in transitively by ratatui 0.29.0. The advisory is
  # maintenance-only rather than a known soundness or security break, and there
  # is no direct replacement we can apply from this crate without changing the
  # ratatui stack. Revisit when ratatui drops or replaces paste.
  "RUSTSEC-2024-0436",
  # rustls-pemfile 2.2.0 is unmaintained (repo archived). Pulled in by
  # hyper-rustls 0.25.0 transitively; only used by multi-sync.
  "RUSTSEC-2025-0134",
  # rustls-webpki 0.102.8: CRL Distribution Point matching logic bug.
  # Limited impact (requires compromised issuing authority).
  "RUSTSEC-2026-0049",
  # rustls-webpki 0.102.8: URI name constraints incorrectly accepted.
  "RUSTSEC-2026-0098",
  # rustls-webpki 0.102.8: Name constraints accepted for wildcard names.
  "RUSTSEC-2026-0099",
]

[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
  # webpki-roots bundles Mozilla's CA list under CDLA-Permissive-2.0.
  # Permissive; required transitively via libsql when `multi-sync` is enabled.
  "CDLA-Permissive-2.0",
]
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
